apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cert-sync
  namespace: argocd
spec:
  project: infra
  source:
    repoURL: https://github.com/itruslan/homelab-gitops.git
    targetRevision: HEAD
    path: apps/cert-sync
  destination:
    server: https://kubernetes.default.svc
    namespace: cert-sync
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
