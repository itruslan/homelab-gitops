apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: vps-gitops
  namespace: argocd
spec:
  project: infra
  source:
    repoURL: git@github.com:itruslan/vps-gitops.git
    targetRevision: HEAD
    path: bootstrap
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
