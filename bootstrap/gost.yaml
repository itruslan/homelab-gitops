apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: homelab-gost
  namespace: argocd
spec:
  project: infra
  source:
    repoURL: git@github.com:itruslan/homelab-gitops.git
    targetRevision: HEAD
    path: apps/gost
    helm:
      releaseName: gost
  destination:
    server: https://kubernetes.default.svc
    namespace: gost
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
    - CreateNamespace=true
