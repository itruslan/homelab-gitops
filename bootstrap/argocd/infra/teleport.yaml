apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: teleport
  namespace: argocd
spec:
  goTemplate: true
  goTemplateOptions: ["missingkey=error"]
  generators:
  - clusters:
      selector:
        matchExpressions:
        - key: deploy_teleport
          operator: In
          values: ['true']
  template:
    metadata:
      name: '{{.name}}-teleport'
    spec:
      project: infra
      sources:
      - repoURL: https://github.com/itruslan/homelab-gitops.git
        targetRevision: HEAD
        path: charts/infra/teleport
        helm:
          releaseName: teleport
          ignoreMissingValueFiles: true
          valueFiles:
          - values.yaml
          - ../../../clusters/{{.name}}/teleport/values.yaml
      - repoURL: https://github.com/itruslan/homelab-gitops.git
        targetRevision: HEAD
        path: clusters/{{.name}}/teleport/manifests
        directory:
          recurse: true
      destination:
        name: '{{.name}}'
        namespace: teleport
      ignoreDifferences:
      - group: resources.teleport.dev
        kind: TeleportGithubConnector
        jsonPointers:
        - /spec/client_secret_from_secret
        - /spec/client_secret
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
        - CreateNamespace=true
