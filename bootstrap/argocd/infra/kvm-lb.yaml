apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: kvm-lb
  namespace: argocd
spec:
  goTemplate: true
  goTemplateOptions: ["missingkey=error"]
  generators:
  - clusters:
      selector:
        matchExpressions:
        - key: deploy_kvm_lb
          operator: In
          values: ['true']
  template:
    metadata:
      name: '{{.name}}-kvm-lb'
    spec:
      project: infra
      sources:
      - repoURL: https://github.com/itruslan/homelab-gitops.git
        targetRevision: HEAD
        path: clusters/{{.name}}/kvm-lb/manifests
        directory:
          recurse: true
      destination:
        name: '{{.name}}'
        namespace: kvm-lb
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
        - CreateNamespace=true
