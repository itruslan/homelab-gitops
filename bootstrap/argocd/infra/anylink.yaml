apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: anylink
  namespace: argocd
spec:
  goTemplate: true
  goTemplateOptions: ["missingkey=error"]
  generators:
  - clusters:
      selector:
        matchExpressions:
        - key: deploy_anylink
          operator: In
          values: ['true']
  template:
    metadata:
      name: '{{.name}}-anylink'
    spec:
      project: infra
      sources:
      - repoURL: https://github.com/itruslan/homelab-gitops.git
        targetRevision: HEAD
        path: charts/infra/anylink
        helm:
          releaseName: anylink
          ignoreMissingValueFiles: true
          valueFiles:
          - values.yaml
          - ../../../clusters/{{.name}}/anylink/values.yaml
      - repoURL: https://github.com/itruslan/homelab-gitops.git
        targetRevision: HEAD
        path: clusters/{{.name}}/anylink/manifests
        directory:
          recurse: true
      destination:
        name: '{{.name}}'
        namespace: anylink
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
        - CreateNamespace=true
