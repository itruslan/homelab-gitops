apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: cert-manager
  namespace: argocd
spec:
  goTemplate: true
  goTemplateOptions: ["missingkey=error"]
  generators:
  - clusters:
      selector:
        matchExpressions:
        - key: deploy_cert_manager
          operator: In
          values: ['true']
  template:
    metadata:
      name: '{{.name}}-cert-manager'
    spec:
      project: infra
      sources:
      - repoURL: https://github.com/itruslan/homelab-gitops.git
        targetRevision: HEAD
        path: charts/infra/cert-manager/0.1.0
        helm:
          releaseName: cert-manager
          ignoreMissingValueFiles: true
          valueFiles:
          - values.yaml
          - ../../../../clusters/{{.name}}/cert-manager/values.yaml
      - repoURL: https://github.com/itruslan/homelab-gitops.git
        targetRevision: HEAD
        path: clusters/{{.name}}/cert-manager/manifests
        directory:
          recurse: true
      destination:
        name: '{{.name}}'
        namespace: cert-manager
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
        - CreateNamespace=true
