apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: openclaw
  namespace: argocd
spec:
  goTemplate: true
  goTemplateOptions: ["missingkey=error"]
  generators:
  - clusters:
      selector:
        matchExpressions:
        - key: deploy_openclaw
          operator: In
          values: ['true']
  template:
    metadata:
      name: '{{.name}}-openclaw'
    spec:
      project: infra
      sources:
      - repoURL: https://github.com/itruslan/homelab-gitops.git
        targetRevision: HEAD
        path: clusters/{{.name}}/openclaw/manifests
        directory:
          recurse: true
      destination:
        name: '{{.name}}'
        namespace: openclaw
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
        - CreateNamespace=true
