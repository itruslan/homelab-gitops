apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: cilium
  namespace: argocd
spec:
  goTemplate: true
  goTemplateOptions: ["missingkey=error"]
  generators:
  - clusters:
      selector:
        matchExpressions:
        - key: deploy_cilium
          operator: In
          values: ['true']
  template:
    metadata:
      name: '{{.name}}-cilium'
    spec:
      project: infra
      sources:
      - repoURL: https://github.com/itruslan/homelab-gitops.git
        targetRevision: HEAD
        path: charts/infra/cilium
        helm:
          releaseName: cilium
          ignoreMissingValueFiles: true
          valueFiles:
          - values.yaml
          - ../../../clusters/{{.name}}/cilium/values.yaml
      - repoURL: https://github.com/itruslan/homelab-gitops.git
        targetRevision: HEAD
        path: clusters/{{.name}}/cilium/manifests
        directory:
          recurse: true
      destination:
        name: '{{.name}}'
        namespace: kube-system
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
        - CreateNamespace=true
