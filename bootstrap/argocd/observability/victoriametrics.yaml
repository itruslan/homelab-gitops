apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: victoriametrics
  namespace: argocd
spec:
  goTemplate: true
  goTemplateOptions: ["missingkey=error"]
  generators:
  - clusters:
      selector:
        matchExpressions:
        - key: deploy_victoriametrics
          operator: In
          values: ['true']
  template:
    metadata:
      name: '{{.name}}-victoriametrics'
    spec:
      project: observability
      sources:
      - repoURL: https://github.com/itruslan/homelab-gitops.git
        targetRevision: HEAD
        path: charts/observability/victoriametrics/0.1.0
        helm:
          releaseName: victoriametrics
          ignoreMissingValueFiles: true
          valueFiles:
          - values.yaml
          - ../../../../clusters/{{.name}}/victoriametrics/values.yaml
      - repoURL: https://github.com/itruslan/homelab-gitops.git
        targetRevision: HEAD
        path: clusters/{{.name}}/victoriametrics/manifests
        directory:
          recurse: true
      destination:
        name: '{{.name}}'
        namespace: monitoring
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
        - CreateNamespace=true
