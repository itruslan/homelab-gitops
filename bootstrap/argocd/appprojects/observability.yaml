apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: observability
  namespace: argocd
spec:
  description: Observability stack
  sourceRepos:
  - '*'
  destinations:
  - namespace: '*'
    server: https://kubernetes.default.svc
  - namespace: '*'
    name: fh-vps
  - namespace: '*'
    name: hshp-vps
  clusterResourceWhitelist:
  - group: '*'
    kind: '*'
