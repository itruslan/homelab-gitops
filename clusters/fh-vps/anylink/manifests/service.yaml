apiVersion: v1
kind: Service
metadata:
  name: anylink
  namespace: {{ .Release.Namespace }}
  {{- if .Values.tls.domain }}
  annotations:
    external-dns.alpha.kubernetes.io/hostname: {{ append .Values.tls.extraDomains .Values.tls.domain | join "," }}
  {{- end }}
spec:
  type: {{ .Values.service.type }}
  selector:
    app: anylink
  ports:
  - name: vpn-tcp
    port: 443
    targetPort: 443
    protocol: TCP
  - name: vpn-udp
    port: 443
    targetPort: 443
    protocol: UDP
  - name: admin
    port: 8800
    targetPort: 8800
    protocol: TCP
  sessionAffinity: ClientIP
