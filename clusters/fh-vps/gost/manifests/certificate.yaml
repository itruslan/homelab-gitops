{{- if .Values.tls.enabled }}
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: gost-tls
  namespace: {{ .Release.Namespace }}
spec:
  secretName: gost-tls
  issuerRef:
    name: {{ .Values.tls.issuer }}
    kind: ClusterIssuer
  dnsNames:
  {{- range .Values.tls.domains }}
  - {{ . }}
  {{- end }}
{{- end }}
