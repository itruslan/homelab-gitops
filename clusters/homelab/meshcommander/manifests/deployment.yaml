apiVersion: apps/v1
kind: Deployment
metadata:
  name: meshcommander
  namespace: meshcommander
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: meshcommander
  template:
    metadata:
      labels:
        app: meshcommander
    spec:
      containers:
      - name: meshcommander
        image: brytonsalisbury/mesh-mini:amd64
        imagePullPolicy: IfNotPresent
        env:
        - name: COMPUTER_PATH
          value: /data/computers.json
        ports:
        - name: http
          containerPort: 3000
        volumeMounts:
        - name: data
          mountPath: /data
        resources:
          requests:
            cpu: 50m
            memory: 128Mi
          limits:
            memory: 512Mi
        livenessProbe:
          httpGet:
            path: /
            port: http
          initialDelaySeconds: 30
          periodSeconds: 30
        readinessProbe:
          httpGet:
            path: /
            port: http
          initialDelaySeconds: 5
          periodSeconds: 10
      volumes:
      - name: data
        persistentVolumeClaim:
          claimName: meshcommander-data
