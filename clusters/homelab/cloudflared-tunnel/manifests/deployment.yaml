# Remote-managed tunnel: маршруты задаются в Cloudflare Zero Trust → Tunnels → ваш tunnel → Public Hostnames.
# Пример origin для Teleport: https://teleport-proxy.teleport.svc.cluster.local:443
# + при необходимости Origin Request: HTTP Host = teleport.itruslan.ru (под ваш сертификат/SNI).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cloudflared
  namespace: cloudflared-tunnel
  labels:
    app.kubernetes.io/name: cloudflared
spec:
  replicas: 2
  selector:
    matchLabels:
      app: cloudflared
  template:
    metadata:
      labels:
        app: cloudflared
    spec:
      containers:
        - name: cloudflared
          image: cloudflare/cloudflared:latest
          imagePullPolicy: IfNotPresent
          args:
            - tunnel
            - --no-autoupdate
            - run
          env:
            - name: TUNNEL_TOKEN
              valueFrom:
                secretKeyRef:
                  name: cloudflared-tunnel-token
                  key: token
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: "1"
              memory: 256Mi
