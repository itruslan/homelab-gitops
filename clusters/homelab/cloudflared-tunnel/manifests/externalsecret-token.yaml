# Vault KV v2: homelab/teleport/cloudflare → ключ tunnel_token (токен Remote-managed tunnel из Zero Trust).
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: cloudflared-tunnel-token
  namespace: cloudflared-tunnel
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: vault
  refreshInterval: 1h
  target:
    name: cloudflared-tunnel-token
    creationPolicy: Owner
  data:
    - secretKey: token
      remoteRef:
        key: homelab/teleport/cloudflare
        property: tunnel_token
