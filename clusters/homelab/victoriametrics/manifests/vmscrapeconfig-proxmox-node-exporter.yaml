apiVersion: operator.victoriametrics.com/v1beta1
kind: VMScrapeConfig
metadata:
  name: proxmox-node-exporter
  namespace: monitoring
spec:
  scrape_configs:
  - job_name: node-exporter
    static_configs:
    - targets:
      - 192.168.99.241:9100
      - 192.168.99.242:9100
      - 192.168.99.243:9100
      labels:
        project: homelab
        environment: infra
        service: proxmox
