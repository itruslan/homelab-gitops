apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: argocd-oidc
  namespace: argocd
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: vault
  refreshInterval: 1h
  target:
    name: argocd-secret
    creationPolicy: Merge
  data:
  - secretKey: oidc.clientSecret
    remoteRef:
      key: authentik/apps/argocd
      property: clientSecret
