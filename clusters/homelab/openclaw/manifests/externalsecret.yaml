apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: openclaw-credentials
  namespace: openclaw
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: vault
  refreshInterval: 1h
  target:
    name: openclaw-credentials
    template:
      engineVersion: v2
      data:
        OPENAI_API_KEY: '{{ index . "openaiApiKey" | default (index . "OPENAI_API_KEY") | default "" }}'
        OPENCLAW_GATEWAY_TOKEN: '{{ index . "gatewayToken" | default (index . "OPENCLAW_GATEWAY_TOKEN") | default "" }}'
  dataFrom:
  - extract:
      key: openclaw/credentials
