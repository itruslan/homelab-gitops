apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: openclaw-credentials
  namespace: openclaw
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: vault
  refreshInterval: 1h
  target:
    name: openclaw-credentials
  data:
  - secretKey: ANTHROPIC_API_KEY
    remoteRef:
      key: openclaw/credentials
      property: anthropicApiKey
  - secretKey: OPENAI_API_KEY
    remoteRef:
      key: openclaw/credentials
      property: openaiApiKey
