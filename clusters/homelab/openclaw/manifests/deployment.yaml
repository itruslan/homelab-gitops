apiVersion: apps/v1
kind: Deployment
metadata:
  name: openclaw
  namespace: openclaw
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: openclaw
  template:
    metadata:
      labels:
        app: openclaw
    spec:
      nodeSelector:
        kubernetes.io/hostname: k8s-worker-3
      initContainers:
      - name: init-config
        image: busybox:1.36
        command: ["sh", "-c"]
        args:
        - cp /config-ro/openclaw.json /config-rw/openclaw.json
        volumeMounts:
        - name: config-ro
          mountPath: /config-ro
          readOnly: true
        - name: config-rw
          mountPath: /config-rw
      containers:
      - name: openclaw
        image: ghcr.io/openclaw/openclaw:2026.4.24
        imagePullPolicy: IfNotPresent
        command: ["node", "dist/index.js"]
        args:
        - gateway
        - --allow-unconfigured
        env:
        - name: TZ
          value: Europe/Moscow
        - name: OPENCLAW_CONFIG_PATH
          value: /config-rw/openclaw.json
        - name: OPENCLAW_GATEWAY_TOKEN
          valueFrom:
            secretKeyRef:
              name: openclaw-credentials
              key: OPENCLAW_GATEWAY_TOKEN
              optional: true
        - name: OPENAI_API_KEY
          valueFrom:
            secretKeyRef:
              name: openclaw-credentials
              key: OPENAI_API_KEY
              optional: true
        ports:
        - name: gateway
          containerPort: 18789
        - name: canvas
          containerPort: 18793
        volumeMounts:
        - name: data
          mountPath: /workspace
        - name: config-rw
          mountPath: /config-rw
        resources:
          requests:
            cpu: 200m
            memory: 512Mi
          limits:
            cpu: "12"
            memory: 16Gi
      volumes:
      - name: data
        persistentVolumeClaim:
          claimName: openclaw-data
      - name: config-ro
        configMap:
          name: openclaw-config
      - name: config-rw
        emptyDir: {}
