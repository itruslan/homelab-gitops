apiVersion: v1
kind: ServiceAccount
metadata:
  name: teleport-connector-sync
  namespace: teleport
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: teleport-connector-sync
  namespace: teleport
rules:
- apiGroups: [""]
  resources: ["pods"]
  verbs: ["get", "list"]
- apiGroups: [""]
  resources: ["pods/exec"]
  verbs: ["create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: teleport-connector-sync
  namespace: teleport
subjects:
- kind: ServiceAccount
  name: teleport-connector-sync
  namespace: teleport
roleRef:
  kind: Role
  name: teleport-connector-sync
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: batch/v1
kind: Job
metadata:
  name: teleport-github-connector-sync
  namespace: teleport
  annotations:
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: HookSucceeded
spec:
  ttlSecondsAfterFinished: 300
  template:
    spec:
      serviceAccountName: teleport-connector-sync
      restartPolicy: OnFailure
      containers:
      - name: sync
        image: bitnami/kubectl:latest
        env:
        - name: CLIENT_SECRET
          valueFrom:
            secretKeyRef:
              name: teleport-github-oauth
              key: client_secret
        command:
        - /bin/bash
        - -c
        - |
          set -e
          AUTH_POD=$(kubectl get pod -n teleport -l app.kubernetes.io/component=auth -o jsonpath='{.items[0].metadata.name}')
          printf 'kind: github\nversion: v3\nmetadata:\n  name: github\nspec:\n  client_id: "Ov23li3l8rIAFr6XaCJ8"\n  client_secret: "%s"\n  redirect_url: "https://teleport.itruslan.ru/v1/webapi/github/callback"\n  teams_to_roles:\n  - organization: "cheburnet-systems"\n    team: "admins"\n    roles:\n    - editor\n    - access\n    - auditor\n    - windows-access\n    - admin\n' "$CLIENT_SECRET" > /tmp/connector.yaml
          kubectl exec -n teleport -i "$AUTH_POD" -- tctl create --force -f - < /tmp/connector.yaml
