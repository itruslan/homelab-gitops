apiVersion: resources.teleport.dev/v3
kind: TeleportGithubConnector
metadata:
  name: github
  namespace: teleport
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  # client_id через secret:// не поддерживается оператором; только client_secret (см. документацию Teleport).
  client_id: Ov23li3l8rIAFr6XaCJ8
  client_secret: secret://teleport-github-oauth/client_secret
  display: GitHub
  redirect_url: "https://teleport.itruslan.ru/v1/webapi/github/callback"
  teams_to_roles:
    - organization: "cheburnet-systems"
      team: "admins"
      roles:
        - editor
        - access
        - auditor
        - windows-access
