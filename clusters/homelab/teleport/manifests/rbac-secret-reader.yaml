apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: teleport-secret-reader
  namespace: teleport
rules:
- apiGroups: [""]
  resources: ["secrets"]
  verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: teleport-secret-reader
  namespace: teleport
subjects:
- kind: ServiceAccount
  name: teleport
  namespace: teleport
roleRef:
  kind: Role
  name: teleport-secret-reader
  apiGroup: rbac.authorization.k8s.io
