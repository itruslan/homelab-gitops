apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: gost-config
  namespace: gost
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: vault
  refreshInterval: 1h
  target:
    name: gost-config
    creationPolicy: Owner
    template:
      data:
        gost.yml: |
          services:
          - name: http-proxy
            addr: ":8080"
            handler:
              type: http
              chain: chain-http
            listener:
              type: tcp
          - name: socks5-proxy
            addr: ":1080"
            handler:
              type: socks5
              chain: chain-socks5
            listener:
              type: tcp
          - name: http-proxy-tls
            addr: ":8443"
            handler:
              type: http
              chain: chain-http
            listener:
              type: tls
              tls:
                certFile: /etc/gost/tls/tls.crt
                keyFile: /etc/gost/tls/tls.key
          - name: socks5-proxy-tls
            addr: ":1443"
            handler:
              type: socks5
              chain: chain-socks5
            listener:
              type: tls
              tls:
                certFile: /etc/gost/tls/tls.crt
                keyFile: /etc/gost/tls/tls.key
          chains:
          - name: chain-http
            selector:
              strategy: round
              maxFails: 3
              failTimeout: 30s
            hops:
            - name: hop-http
              selector:
                strategy: round
              nodes:
              - name: gost-fh-http
                addr: '{{ .gostFhHttpAddr }}'
                connector:
                  type: http
                  auth:
                    username: '{{ .username }}'
                    password: '{{ .password }}'
                dialer:
                  type: tcp
          - name: chain-socks5
            selector:
              strategy: round
              maxFails: 3
              failTimeout: 30s
            hops:
            - name: hop-socks5
              selector:
                strategy: round
              nodes:
              - name: gost-fh-socks5
                addr: '{{ .gostFhSocks5Addr }}'
                connector:
                  type: socks5
                  auth:
                    username: '{{ .username }}'
                    password: '{{ .password }}'
                dialer:
                  type: tcp
          log:
            output: stderr
            level: info
            format: json
  data:
  - secretKey: username
    remoteRef:
      key: homelab/gost/users/itruslan
      property: username
  - secretKey: password
    remoteRef:
      key: homelab/gost/users/itruslan
      property: password
  - secretKey: gostFhHttpAddr
    remoteRef:
      key: homelab/gost/upstreams
      property: gost_fh_http_addr
  - secretKey: gostFhSocks5Addr
    remoteRef:
      key: homelab/gost/upstreams
      property: gost_fh_socks5_addr
