apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: fh-vps2-cloudflare-token
  namespace: external-secrets
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: vault
  refreshInterval: 1h
  target:
    name: fh-vps2-cloudflare-token
  data:
  - secretKey: token
    remoteRef:
      key: homelab/clusters/fh-vps2
      property: cloudflareToken
      conversionStrategy: Default
      decodingStrategy: None
      metadataPolicy: None
