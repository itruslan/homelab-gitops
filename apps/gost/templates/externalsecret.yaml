apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: gost-config
  namespace: {{ .Release.Namespace }}
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: vault
  refreshInterval: 1h
  target:
    name: gost-config
    creationPolicy: Owner
    template:
      data:
        gost.yml: |
          services:
          - name: http-proxy
            addr: ":{{ .Values.service.httpPort }}"
            handler:
              type: http
              chain: chain-http
            listener:
              type: tcp
          - name: socks5-proxy
            addr: ":{{ .Values.service.socks5Port }}"
            handler:
              type: socks5
              chain: chain-socks5
            listener:
              type: tcp
          chains:
          - name: chain-http
            selector:
              strategy: round
              maxFails: 3
              failTimeout: 30s
            hops:
            - name: hop-http
              selector:
                strategy: round
              nodes:
              - name: gost-hshp-http
                addr: "{{ .Values.upstreams.hshpVps.httpAddr }}"
                connector:
                  type: http
                  auth:
                    username: '{{ "{{" }} .username {{ "}}" }}'
                    password: '{{ "{{" }} .password {{ "}}" }}'
                dialer:
                  type: tls
              - name: gost-fh-http
                addr: "{{ .Values.upstreams.gostFh.httpAddr }}"
                connector:
                  type: http
                  auth:
                    username: '{{ "{{" }} .username {{ "}}" }}'
                    password: '{{ "{{" }} .password {{ "}}" }}'
                dialer:
                  type: tcp
          - name: chain-socks5
            selector:
              strategy: round
              maxFails: 3
              failTimeout: 30s
            hops:
            - name: hop-socks5
              selector:
                strategy: round
              nodes:
              - name: gost-hshp-socks5
                addr: "{{ .Values.upstreams.hshpVps.socks5Addr }}"
                connector:
                  type: socks5
                  auth:
                    username: '{{ "{{" }} .username {{ "}}" }}'
                    password: '{{ "{{" }} .password {{ "}}" }}'
                dialer:
                  type: tls
              - name: gost-fh-socks5
                addr: "{{ .Values.upstreams.gostFh.socks5Addr }}"
                connector:
                  type: socks5
                  auth:
                    username: '{{ "{{" }} .username {{ "}}" }}'
                    password: '{{ "{{" }} .password {{ "}}" }}'
                dialer:
                  type: tcp
          log:
            output: stderr
            level: info
            format: json
  data:
  - secretKey: username
    remoteRef:
      key: {{ .Values.vault.secretPath }}
      property: username
  - secretKey: password
    remoteRef:
      key: {{ .Values.vault.secretPath }}
      property: password
