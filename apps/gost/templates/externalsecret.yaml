apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: gost-config
  namespace: {{ .Release.Namespace }}
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: vault
  refreshInterval: 1h
  target:
    name: gost-config
    creationPolicy: Owner
    template:
      data:
        gost.yml: |
          services:
          - name: http-proxy
            addr: ":{{ .Values.service.httpPort }}"
            handler:
              type: http
              chain: chain-http
            listener:
              type: tcp
          - name: socks5-proxy
            addr: ":{{ .Values.service.socks5Port }}"
            handler:
              type: socks5
              chain: chain-socks5
            listener:
              type: tcp
          - name: http-proxy-tls
            addr: ":{{ .Values.service.httpTlsPort }}"
            handler:
              type: http
              chain: chain-http
            listener:
              type: tls
              tls:
                certFile: /etc/gost/tls/tls.crt
                keyFile: /etc/gost/tls/tls.key
          - name: socks5-proxy-tls
            addr: ":{{ .Values.service.socks5TlsPort }}"
            handler:
              type: socks5
              chain: chain-socks5
            listener:
              type: tls
              tls:
                certFile: /etc/gost/tls/tls.crt
                keyFile: /etc/gost/tls/tls.key
          chains:
          - name: chain-http
            selector:
              strategy: round
              maxFails: 3
              failTimeout: 30s
            hops:
            - name: hop-http
              selector:
                strategy: round
              nodes:
              - name: gost-hshp-http
                addr: '{{ "{{" }} .hshpVpsHttpAddr {{ "}}" }}'
                connector:
                  type: http
                  auth:
                    username: '{{ "{{" }} .username {{ "}}" }}'
                    password: '{{ "{{" }} .password {{ "}}" }}'
                dialer:
                  type: tls
              - name: gost-fh-http
                addr: '{{ "{{" }} .gostFhHttpAddr {{ "}}" }}'
                connector:
                  type: http
                  auth:
                    username: '{{ "{{" }} .username {{ "}}" }}'
                    password: '{{ "{{" }} .password {{ "}}" }}'
                dialer:
                  type: tcp
          - name: chain-socks5
            selector:
              strategy: round
              maxFails: 3
              failTimeout: 30s
            hops:
            - name: hop-socks5
              selector:
                strategy: round
              nodes:
              - name: gost-hshp-socks5
                addr: '{{ "{{" }} .hshpVpsSocks5Addr {{ "}}" }}'
                connector:
                  type: socks5
                  auth:
                    username: '{{ "{{" }} .username {{ "}}" }}'
                    password: '{{ "{{" }} .password {{ "}}" }}'
                dialer:
                  type: tls
              - name: gost-fh-socks5
                addr: '{{ "{{" }} .gostFhSocks5Addr {{ "}}" }}'
                connector:
                  type: socks5
                  auth:
                    username: '{{ "{{" }} .username {{ "}}" }}'
                    password: '{{ "{{" }} .password {{ "}}" }}'
                dialer:
                  type: tcp
          log:
            output: stderr
            level: info
            format: json
  data:
  - secretKey: username
    remoteRef:
      key: {{ .Values.vault.secretPath }}
      property: username
  - secretKey: password
    remoteRef:
      key: {{ .Values.vault.secretPath }}
      property: password
  - secretKey: hshpVpsHttpAddr
    remoteRef:
      key: {{ .Values.vault.upstreamsPath }}
      property: hshp_vps_http_addr
  - secretKey: hshpVpsSocks5Addr
    remoteRef:
      key: {{ .Values.vault.upstreamsPath }}
      property: hshp_vps_socks5_addr
  - secretKey: gostFhHttpAddr
    remoteRef:
      key: {{ .Values.vault.upstreamsPath }}
      property: gost_fh_http_addr
  - secretKey: gostFhSocks5Addr
    remoteRef:
      key: {{ .Values.vault.upstreamsPath }}
      property: gost_fh_socks5_addr
