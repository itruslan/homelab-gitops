grafana:
  fullnameOverride: grafana

  admin:
    existingSecret: grafana-admin
    userKey: admin-user
    passwordKey: admin-password

  persistence:
    enabled: true
    size: 5Gi

  grafana.ini:
    server:
      root_url: https://grafana.itruslan.ru
    auth.generic_oauth:
      enabled: true
      name: Authentik
      icon: signin
      client_id: $__env{GF_AUTH_GENERIC_OAUTH_CLIENT_ID}
      client_secret: $__env{GF_AUTH_GENERIC_OAUTH_CLIENT_SECRET}
      scopes: openid email profile
      auth_url: https://auth.itruslan.ru/application/o/authorize/
      token_url: https://auth.itruslan.ru/application/o/token/
      api_url: https://auth.itruslan.ru/application/o/userinfo/
      role_attribute_path: preferred_username == 'itruslan' && 'Admin' || 'Viewer'
      allow_sign_up: true

  envFromSecret: grafana-oidc

  defaultDashboardsEnabled: true
  sidecar:
    dashboards:
      enabled: true
      searchNamespace: ALL
