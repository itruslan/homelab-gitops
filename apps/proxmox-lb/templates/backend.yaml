apiVersion: v1
kind: ConfigMap
metadata:
  name: haproxy-config
  namespace: proxmox-lb
data:
  haproxy.cfg: |
    global
      log stdout format raw local0
      maxconn 4096

    defaults
      log global
      mode tcp
      option tcplog
      option dontlognull
      timeout connect 5s
      timeout client 30s
      timeout server 30s

    frontend proxmox_front
      bind *:8006
      default_backend proxmox_back

    backend proxmox_back
      balance source
      option tcp-check
      {{- range .Values.nodes }}
      server {{ .name }} {{ .ip }}:8006 ssl verify none check
      {{- end }}
    {{- range $i, $node := .Values.nodes }}

    frontend {{ $node.name }}_front
      bind *:{{ add 9000 $i }}
      default_backend {{ $node.name }}_back

    backend {{ $node.name }}_back
      server {{ $node.name }} {{ $node.ip }}:8006 ssl verify none
    {{- end }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: haproxy
  namespace: proxmox-lb
spec:
  replicas: 1
  selector:
    matchLabels:
      app: haproxy
  template:
    metadata:
      labels:
        app: haproxy
    spec:
      containers:
        - name: haproxy
          image: haproxy:lts-alpine
          ports:
            - containerPort: 8006
            {{- range $i, $node := .Values.nodes }}
            - containerPort: {{ add 9000 $i }}
            {{- end }}
          volumeMounts:
            - name: config
              mountPath: /usr/local/etc/haproxy/haproxy.cfg
              subPath: haproxy.cfg
      volumes:
        - name: config
          configMap:
            name: haproxy-config
---
apiVersion: v1
kind: Service
metadata:
  name: proxmox
  namespace: proxmox-lb
spec:
  selector:
    app: haproxy
  ports:
    - name: https
      port: 8006
      targetPort: 8006
{{- range $i, $node := .Values.nodes }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ $node.name }}
  namespace: proxmox-lb
spec:
  selector:
    app: haproxy
  ipFamilyPolicy: SingleStack
  ipFamilies: ["IPv4"]
  ports:
    - name: https
      port: 8006
      targetPort: {{ add 9000 $i }}
{{- end }}
