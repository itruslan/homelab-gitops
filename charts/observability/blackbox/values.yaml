prometheus-blackbox-exporter:
  fullnameOverride: blackbox-exporter

  config:
    modules:
      http_2xx:
        prober: http
        timeout: 10s
        http:
          valid_status_codes: [200, 201, 204, 301, 302, 401, 403]
          preferred_ip_protocol: ip4
          follow_redirects: true
      tcp_connect:
        prober: tcp
        timeout: 10s
      icmp:
        prober: icmp
        timeout: 5s
        icmp:
          preferred_ip_protocol: ip4
      # UDP DNS: цель — IP резолвера, query в модуле
      dns_udp:
        prober: dns
        timeout: 5s
        dns:
          transport_protocol: udp
          preferred_ip_protocol: ip4
          query_name: example.com
      dns_mozilla:
        prober: dns
        timeout: 5s
        dns:
          transport_protocol: udp
          preferred_ip_protocol: ip4
          query_name: mozilla.org
