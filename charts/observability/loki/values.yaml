loki:
  deploymentMode: SingleBinary

  loki:
    auth_enabled: false

    commonConfig:
      replication_factor: 1

    storage:
      type: filesystem
      bucketNames:
        chunks: chunks
        ruler: ruler
        admin: admin

    schemaConfig:
      configs:
        - from: "2024-01-01"
          store: tsdb
          object_store: filesystem
          schema: v13
          index:
            prefix: index_
            period: 24h

  singleBinary:
    replicas: 1
    persistence:
      enabled: true
      size: 20Gi

  # Disable distributed components
  read:
    replicas: 0
  write:
    replicas: 0
  backend:
    replicas: 0

  # Disable gateway (internal access only)
  gateway:
    enabled: false

  # Disable self-monitoring to avoid circular dependency
  selfMonitoring:
    enabled: false
    grafanaAgent:
      installOperator: false

  lokiCanary:
    enabled: false

  test:
    enabled: false

  # Disable memcached caches (not needed for single-binary homelab)
  chunksCache:
    enabled: false
  resultsCache:
    enabled: false
