apiVersion: v1
kind: Service
metadata:
  name: rundeck
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: rundeck
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  selector:
    app.kubernetes.io/name: rundeck
    app.kubernetes.io/instance: {{ .Release.Name }}
  ports:
  - port: {{ .Values.service.port }}
    targetPort: {{ .Values.service.targetPort | default .Values.service.port }}
    protocol: TCP
    name: http
