apiVersion: apps/v1
kind: Deployment
metadata:
  name: rundeck
  namespace: {{ .Release.Namespace }}
  annotations:
    argocd.argoproj.io/sync-wave: "3"
    reloader.stakater.com/auto: "true"
  labels:
    app.kubernetes.io/name: rundeck
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: rundeck
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: rundeck
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      containers:
      - name: rundeck
        image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
        imagePullPolicy: {{ .Values.image.pullPolicy }}
        ports:
        - containerPort: {{ .Values.service.port }}
        env:
        - name: RUNDECK_GRAILS_URL
          value: {{ .Values.rundeck.grailsUrl | quote }}
        - name: RUNDECK_SERVER_ADDRESS
          value: {{ .Values.rundeck.serverAddress | quote }}
        - name: RUNDECK_API_TOKENS_DURATION_MAX
          value: {{ .Values.rundeck.apiTokensDurationMax | quote }}
        - name: RUNDECK_FEATURE_REPOSITORY_ENABLED
          value: {{ .Values.rundeck.featureRepositoryEnabled | quote }}
        - name: RUNDECK_DATABASE_DRIVER
          value: "org.postgresql.Driver"
        - name: RUNDECK_DATABASE_URL
          value: "jdbc:postgresql://{{ .Values.rundeck.database.host }}:{{ .Values.rundeck.database.port }}/{{ .Values.rundeck.database.name }}"
        - name: RUNDECK_DATABASE_USERNAME
          valueFrom:
            secretKeyRef:
              name: {{ .Values.rundeck.database.secretName }}
              key: username
        - name: RUNDECK_DATABASE_PASSWORD
          valueFrom:
            secretKeyRef:
              name: {{ .Values.rundeck.database.secretName }}
              key: password
        - name: RUNDECK_STORAGE_PROVIDER
          value: "db"
        - name: RUNDECK_PROJECT_STORAGE_TYPE
          value: "db"
        - name: SERVER_FORWARD_HEADERS_STRATEGY
          value: "NATIVE"
        - name: RUNDECK_SECURITY_HTTPHEADERS_PROVIDER_CSP_ENABLED
          value: "false"
        {{- if .Values.rundeck.oidc.enabled }}
        - name: RUNDECK_SECURITY_AUTHORIZATION_PREAUTHENTICATED_ENABLED
          value: "true"
        - name: RUNDECK_SECURITY_AUTHORIZATION_PREAUTHENTICATED_ATTRIBUTENAME
          value: "REMOTE_USER_HEADER"
        - name: RUNDECK_SECURITY_AUTHORIZATION_PREAUTHENTICATED_USERNAMEHEADER
          value: "X-Auth-Request-User"
        - name: RUNDECK_SECURITY_AUTHORIZATION_PREAUTHENTICATED_USERROLESHEADER
          value: "X-Auth-Request-Groups"
        - name: RUNDECK_SECURITY_AUTHORIZATION_PREAUTHENTICATED_DELIMITER
          value: ","
        - name: RUNDECK_SECURITY_AUTHORIZATION_PREAUTHENTICATED_USERSYNCENTABLED
          value: "true"
        {{- end }}
        resources:
          {{- toYaml .Values.resources | nindent 10 }}
        volumeMounts:
        - name: data
          mountPath: /home/rundeck/server/data
        {{- if .Values.rundeck.acl.enabled }}
        {{- range $path, $_ := .Files.Glob "files/policies/*.aclpolicy" }}
        - name: acl-policies
          mountPath: /home/rundeck/server/config/{{ base $path }}
          subPath: {{ base $path }}
        {{- end }}
        {{- end }}
        livenessProbe:
          httpGet:
            path: /user/login
            port: {{ .Values.service.port }}
          initialDelaySeconds: 240
          periodSeconds: 30
          failureThreshold: 5
        readinessProbe:
          httpGet:
            path: /user/login
            port: {{ .Values.service.port }}
          initialDelaySeconds: 180
          periodSeconds: 15
      {{- if .Values.rundeck.oidc.enabled }}
      - name: oauth2-proxy
        image: "{{ .Values.rundeck.oidc.proxy.image }}"
        env:
        - name: OAUTH2_PROXY_PROVIDER
          value: "oidc"
        - name: OAUTH2_PROXY_OIDC_ISSUER_URL
          value: "https://{{ .Values.rundeck.oidc.authentikDomain }}/application/o/{{ .Values.rundeck.oidc.appSlug }}/"
        - name: OAUTH2_PROXY_CLIENT_ID
          valueFrom:
            secretKeyRef:
              name: {{ .Values.rundeck.oidc.secretName }}
              key: clientId
        - name: OAUTH2_PROXY_CLIENT_SECRET
          valueFrom:
            secretKeyRef:
              name: {{ .Values.rundeck.oidc.secretName }}
              key: clientSecret
        - name: OAUTH2_PROXY_COOKIE_SECRET
          valueFrom:
            secretKeyRef:
              name: {{ .Values.rundeck.oidc.secretName }}
              key: cookieSecret
        - name: OAUTH2_PROXY_HTTP_ADDRESS
          value: "0.0.0.0:{{ .Values.rundeck.oidc.proxy.port }}"
        - name: OAUTH2_PROXY_UPSTREAMS
          value: "http://127.0.0.1:{{ .Values.service.port }}"
        - name: OAUTH2_PROXY_REDIRECT_URL
          value: "{{ .Values.rundeck.grailsUrl }}/oauth2/callback"
        - name: OAUTH2_PROXY_EMAIL_DOMAINS
          value: "*"
        - name: OAUTH2_PROXY_SCOPE
          value: "openid profile email groups"
        - name: OAUTH2_PROXY_OIDC_GROUPS_CLAIM
          value: "groups"
        - name: OAUTH2_PROXY_SET_XAUTHREQUEST
          value: "true"
        - name: OAUTH2_PROXY_PASS_USER_HEADERS
          value: "true"
        - name: OAUTH2_PROXY_REVERSE_PROXY
          value: "true"
        - name: OAUTH2_PROXY_COOKIE_SECURE
          value: "true"
        - name: OAUTH2_PROXY_COOKIE_SAMESITE
          value: "lax"
        - name: OAUTH2_PROXY_SESSION_STORE_TYPE
          value: "cookie"
        - name: OAUTH2_PROXY_INSECURE_OIDC_ALLOW_UNVERIFIED_EMAIL
          value: {{ .Values.rundeck.oidc.allowUnverifiedEmail | default "false" | quote }}
        ports:
        - containerPort: {{ .Values.rundeck.oidc.proxy.port }}
        livenessProbe:
          httpGet:
            path: /ping
            port: {{ .Values.rundeck.oidc.proxy.port }}
          initialDelaySeconds: 10
          periodSeconds: 15
        readinessProbe:
          httpGet:
            path: /ping
            port: {{ .Values.rundeck.oidc.proxy.port }}
          initialDelaySeconds: 5
          periodSeconds: 10
      {{- end }}
      volumes:
      - name: data
        persistentVolumeClaim:
          claimName: rundeck-data
      {{- if .Values.rundeck.acl.enabled }}
      - name: acl-policies
        configMap:
          name: rundeck-acl
      {{- end }}
