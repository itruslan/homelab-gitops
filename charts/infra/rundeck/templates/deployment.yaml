apiVersion: apps/v1
kind: Deployment
metadata:
  name: rundeck
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: rundeck
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: rundeck
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: rundeck
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      containers:
      - name: rundeck
        image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
        imagePullPolicy: {{ .Values.image.pullPolicy }}
        ports:
        - containerPort: {{ .Values.service.port }}
        env:
        - name: RUNDECK_GRAILS_URL
          value: {{ .Values.rundeck.grailsUrl | quote }}
        - name: RUNDECK_SERVER_ADDRESS
          value: {{ .Values.rundeck.serverAddress | quote }}
        - name: RUNDECK_API_TOKENS_DURATION_MAX
          value: {{ .Values.rundeck.apiTokensDurationMax | quote }}
        - name: RUNDECK_FEATURE_REPOSITORY_ENABLED
          value: {{ .Values.rundeck.featureRepositoryEnabled | quote }}
        - name: RUNDECK_DATABASE_DRIVER
          value: "org.postgresql.Driver"
        - name: RUNDECK_DATABASE_URL
          value: "jdbc:postgresql://{{ .Values.rundeck.database.host }}:{{ .Values.rundeck.database.port }}/{{ .Values.rundeck.database.name }}"
        - name: RUNDECK_DATABASE_USERNAME
          valueFrom:
            secretKeyRef:
              name: {{ .Values.rundeck.database.secretName }}
              key: username
        - name: RUNDECK_DATABASE_PASSWORD
          valueFrom:
            secretKeyRef:
              name: {{ .Values.rundeck.database.secretName }}
              key: password
        - name: RUNDECK_STORAGE_PROVIDER
          value: "db"
        - name: RUNDECK_PROJECT_STORAGE_TYPE
          value: "db"
        resources:
          {{- toYaml .Values.resources | nindent 10 }}
        volumeMounts:
        - name: data
          mountPath: /home/rundeck/server/data
        livenessProbe:
          httpGet:
            path: /
            port: {{ .Values.service.port }}
          initialDelaySeconds: 120
          periodSeconds: 30
          failureThreshold: 5
        readinessProbe:
          httpGet:
            path: /
            port: {{ .Values.service.port }}
          initialDelaySeconds: 60
          periodSeconds: 10
      volumes:
      - name: data
        persistentVolumeClaim:
          claimName: rundeck-data
