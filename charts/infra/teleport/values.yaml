teleport-cluster:
  chartMode: standalone
  proxyListenerMode: multiplex

  persistence:
    enabled: true
    storageClassName: proxmox-data
    size: 10Gi

  authentication:
    type: github
    secondFactors: ["webauthn"]
    connector_name: github

  acme: false

  # TLS via existing wildcard cert (injected per cluster)
  tls:
    existingSecretName: wildcard-itruslan-ru-tls

  annotations:
    service:
      metallb.universe.tf/address-pool: homelab

  auth:
    teleportConfig:
      windows_desktop_service:
        enabled: yes
        listen_addr: "0.0.0.0:3028"
        static_hosts: []
